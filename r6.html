<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senku's Victory Journey</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bsg-blue: #0055a4;
            --bsg-yellow: #ffcc00;
            --bsg-red: #e4002b;
            --path-color: #d1d8e0;
        }

        body {
            margin: 0; padding: 0;
            background: #a2d2ff; 
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center;
        }

        .game-world {
            max-width: 450px; width: 100%; min-height: 100vh;
            background: #fdfcf0; 
            position: relative; padding: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.2);
            border-left: 8px solid var(--bsg-blue);
            border-right: 8px solid var(--bsg-blue);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .welcome-banner {
            background: var(--bsg-blue); color: white; padding: 15px;
            border-radius: 15px; font-weight: 600; font-size: 14px;
            margin-bottom: 20px; box-shadow: 0 4px 0 #003d75; text-align: center;
        }

        h1 { font-family: 'Bungee', cursive; color: var(--bsg-blue); font-size: 18px; text-align: center; line-height: 1.4; margin-top: 0; }

        .journey-map {
            position: relative; padding: 20px 0;
            display: flex; flex-direction: column; align-items: center;
            flex-grow: 1;
        }

        .quest-node {
            width: 70px; height: 70px; border-radius: 50%;
            background: white; border: 6px solid var(--path-color);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 22px; cursor: pointer;
            position: relative; z-index: 2; transition: 0.3s;
            margin-bottom: 80px; box-shadow: 0 8px 0 var(--path-color);
        }

        /* Zig-zag layout */
        .quest-node:nth-child(3n+1) { transform: translateX(-90px); }
        .quest-node:nth-child(3n+2) { transform: translateX(0px); }
        .quest-node:nth-child(3n+3) { transform: translateX(90px); }

        .quest-node.completed {
            background: var(--bsg-red); border-color: var(--bsg-yellow);
            box-shadow: 0 8px 0 #b30022; color: white;
        }

        .quest-label {
            position: absolute; width: 160px; font-size: 11px;
            background: white; padding: 10px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-weight: 600;
            color: #333; line-height: 1.3; pointer-events: none;
            border: 2px solid #eee;
        }

        .quest-node:nth-child(3n+1) .quest-label { left: 85px; text-align: left; }
        .quest-node:nth-child(3n+2) .quest-label { top: 80px; left: 50%; transform: translateX(-50%); width: 200px; text-align: center; }
        .quest-node:nth-child(3n+3) .quest-label { right: 85px; text-align: right; }

        .quest-node.completed .quest-label { background: #fff9e6; border-color: var(--bsg-yellow); opacity: 0.8; }

        .bottom-section { margin-top: auto; padding-top: 20px; }

        /* Vow Wall Styling */
        .vow-wall {
            background: #fff; border: 3px dashed var(--bsg-red);
            border-radius: 15px; padding: 15px; margin-bottom: 20px;
            text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .vow-title { font-weight: 800; color: var(--bsg-red); font-size: 12px; margin-bottom: 8px; text-transform: uppercase; }
        #vow-input {
            width: 90%; border: none; font-family: 'Poppins', sans-serif;
            font-size: 13px; text-align: center; font-style: italic;
            outline: none; background: transparent; color: #444;
            resize: none;
        }

        .guidance-bubble {
            background: white; border: 3px solid var(--bsg-yellow);
            border-radius: 20px; padding: 15px; margin-bottom: 15px;
            position: relative; text-align: center; box-shadow: 0 4px 0 var(--bsg-yellow);
        }
        .guidance-tag {
            background: var(--bsg-yellow); color: #333;
            position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
            padding: 2px 12px; border-radius: 10px; font-weight: 800; font-size: 10px;
        }

        .countdown-card {
            background: var(--bsg-blue); border-radius: 25px; padding: 20px;
            color: white; text-align: center; border-bottom: 6px solid #003d75;
        }
        #timer { font-family: 'Bungee', cursive; font-size: 22px; color: var(--bsg-yellow); }

        .btn-reset { background:none; border:none; color:#777; font-size:10px; cursor:pointer; margin: 15px 0; text-decoration: underline; }
    </style>
</head>
<body>

<div class="game-world">
    <div class="welcome-banner">🌟 Welcome, Beloved Protagonist of Kosen-rufu!</div>
    
    <h1>Youth Division Senku's daily quest for absolute victory!</h1>

    <div class="journey-map" id="map"></div>

    <div class="bottom-section">
        <div class="vow-wall">
            <div class="vow-title">🦁 My Personal Vow for March 15</div>
            <textarea id="vow-input" placeholder="Type your determination here..."></textarea>
        </div>

        <div class="guidance-bubble">
            <div class="guidance-tag">DAILY GUIDANCE 🦁</div>
            <p id="daily-quote" style="font-size: 13px; font-style: italic; margin: 5px 0; color: #444;"></p>
        </div>

        <div class="countdown-card">
            <div style="font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; opacity: 0.9;">
                Let's come together for the Youth Division New Friends Festival in -
            </div>
            <div id="timer">00d 00h 00m 00s</div>
        </div>
        
        <center><button onclick="resetGame()" class="btn-reset">Restart My Quest</button></center>
    </div>
</div>

<script>
    const quests = [
        "Chant for 20 minutes!", "Homevisit a fellow YD Member!",
        "Message a youth member!", "Read NHR-3", "Read 5 pages of Value Creation",
        "Share Sensei's guidance!", "Invite a friend to Festival", "Have a dialogue",
        "Encourage study call attendance", "Talk to a friend in need", "Chant 15m more than yesterday"
    ];

    const guidanceList = [
        "Faith is another name for inexhaustible hope.",
        "A person who has a mission is strong. A person who lives for a great vow is invincible.",
        "Victory is won through steady, daily efforts.",
        "Prayer is the engine that pulls us forward.",
        "Everything starts with one person's courage.",
        "The sun of victory always rises for those who persevere."
    ];

    let completed = JSON.parse(localStorage.getItem('senkuMapProgress')) || [];

    // --- VOW WALL LOGIC ---
    const vowInput = document.getElementById('vow-input');
    vowInput.value = localStorage.getItem('senkuVow') || "";
    vowInput.addEventListener('input', () => {
        localStorage.setItem('senkuVow', vowInput.value);
    });

    function renderMap() {
        const mapContainer = document.getElementById('map');
        mapContainer.innerHTML = '';
        quests.forEach((q, i) => {
            const isDone = completed.includes(i);
            const node = document.createElement('div');
            node.className = `quest-node ${isDone ? 'completed' : ''}`;
            node.innerHTML = `${i + 1} <div class="quest-label">${q}</div>`;
            node.onclick = () => toggleQuest(i);
            mapContainer.appendChild(node);
        });
        const day = new Date().getDate();
        document.getElementById('daily-quote').innerText = guidanceList[day % guidanceList.length];
    }

    function toggleQuest(i) {
        if (completed.includes(i)) {
            completed = completed.filter(x => x !== i);
        } else {
            completed.push(i);
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 }, colors: ['#0055a4', '#ffcc00', '#e4002b'] });
        }
        localStorage.setItem('senkuMapProgress', JSON.stringify(completed));
        renderMap();
    }

    function resetGame() {
        if(confirm("Ready to restart your quest for victory?")) {
            completed = [];
            localStorage.setItem('senkuMapProgress', JSON.stringify(completed));
            localStorage.removeItem('senkuVow');
            vowInput.value = "";
            renderMap();
        }
    }

    const festivalDate = new Date("March 15, 2026 00:00:00").getTime();
    setInterval(() => {
        const now = new Date().getTime();
        const diff = festivalDate - now;
        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);
        document.getElementById("timer").innerText = `${d}d ${h}h ${m}s ${s}s`;
    }, 1000);

    renderMap();
</script>
</body>
</html>
